spring.application.name=Week_4
# ============================================================
# APPLICATION
# ============================================================
# ============================================================
# SERVER ? Embedded Tomcat
# ============================================================
# Port chay ung dung (mac dinh 8080)
server.port=8080

# ============================================================
# DATABASE ? MySQL Connection
# ============================================================
# URL ket noi MySQL
# - localhost:3306 = dia chi + port MySQL
# - hit_springboot = ten database (phai tao truoc trong MySQL)
# - useSSL=false = tat SSL (dev environment)
# - serverTimezone=Asia/Ho_Chi_Minh = timezone Viet Nam
# - allowPublicKeyRetrieval=true = cho phep lay public key (can cho MySQL 8+)
spring.datasource.url=jdbc:mysql://localhost:3306/hit_springboot?createDatabaseIfNotExist=true

# Tai khoan MySQL
spring.datasource.username=root
spring.datasource.password=123456

# JDBC Driver (MySQL 8+)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
# ddl-auto: cach Hibernate xu ly schema database
# - none     = khong lam gi (production)
# - validate = chi kiem tra schema khop Entity (production)
# - update   = tu dong tao/cap nhat table (development) ? DUNG CAI NAY
# - create   = xoa va tao lai table moi lan chay (mat du lieu!)
# - create-drop = nhu create + xoa khi tat app
spring.jpa.hibernate.ddl-auto=update

# Hien thi SQL query trong console (debug)
spring.jpa.show-sql=true

# Format SQL cho de doc
spring.jpa.properties.hibernate.format_sql=true

# Dialect: chi dinh loai database de Hibernate toi uu SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JACKSON ? JSON Serialization
# ============================================================
# Format JSON dep (pretty print) ? chi dung khi dev
spring.jackson.serialization.indent-output=true

# Dinh dang ngay gio trong JSON
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ============================================================
# LOGGING
# ============================================================
# Log level chung
logging.level.root=INFO

# Log chi tiet cho package cua minh
logging.level.com.hit.springboot=DEBUG

# Log SQL parameters (thay gia tri thay vi dau ?)
logging.level.org.hibernate.orm.jdbc.bind=TRACE